<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenF1 Control Deck</title>
  <style>
    :root {
      --bg-0: #080a0f;
      --bg-1: #0f131b;
      --panel: #121825;
      --ink: #f3f6ff;
      --muted: #9aa7bf;
      --accent: #ff2438;
      --accent-hot: #ff7a00;
      --track: #484e5e;
      --line: #eef2fb;
      --ok: #4fd18a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Bahnschrift SemiCondensed", "Rajdhani", "Arial Narrow", sans-serif;
      background:
        radial-gradient(1100px 750px at 6% -8%, #2d3752 0%, transparent 62%),
        linear-gradient(140deg, var(--bg-0) 0%, var(--bg-1) 58%, #0a0d13 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.02) 50%, transparent 100%),
        repeating-linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.015) 0 7px,
          transparent 7px 14px
        );
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1420px;
      margin: 20px auto 28px;
      padding: 0 16px;
    }

    .masthead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #273043;
      background: linear-gradient(145deg, #111826 0%, #0c111a 100%);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.35);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 78px;
      height: 42px;
      flex: 0 0 auto;
    }

    .brand-text {
      display: flex;
      align-items: baseline;
      gap: 6px;
      line-height: 1;
      white-space: nowrap;
    }

    .brand-text .open {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .brand-text .f1 {
      color: var(--accent);
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .tagline {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .session-pill {
      border: 1px solid #33445f;
      background: linear-gradient(145deg, #1a2335 0%, #121a28 100%);
      color: #cad5eb;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin: 14px 0;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 130px;
    }

    .control-group.wide {
      min-width: 320px;
      flex: 1;
    }

    .control-group.replay {
      min-width: 420px;
      flex: 2;
    }

    .control-label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    select {
      border: 1px solid #2e3b54;
      background: #111827cc;
      color: #d8e0f3;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
    }

    select:focus {
      border-color: #6f86b4;
    }

    .hidden {
      display: none !important;
    }

    .replay-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .replay-row input[type="range"] {
      width: 240px;
      accent-color: #ff2438;
    }

    .replay-value {
      color: #d8e0f3;
      font-size: 12px;
      min-width: 70px;
    }

    button {
      border: 0;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-hot) 100%);
      color: #ffffff;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 8px;
      padding: 0;
      transform: skewX(-14deg);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(255, 36, 56, 0.35);
    }

    button span {
      display: inline-block;
      padding: 11px 16px;
      transform: skewX(14deg);
    }

    .mini-btn {
      transform: none;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 11px;
      box-shadow: none;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #33445f 0%, #1d2a41 100%);
    }

    .mini-btn span {
      transform: none;
      padding: 0;
    }

    .meta {
      border: 1px solid #2e3b54;
      background: #111827cc;
      color: #d8e0f3;
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 13px;
      min-width: 260px;
      flex: 1;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      border: 1px solid #2a3550;
      background: linear-gradient(160deg, #141c2d 0%, #0f1622 100%);
      border-radius: 10px;
      padding: 10px 12px;
      min-height: 74px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat .value {
      color: #f7f9ff;
      font-size: 17px;
      font-weight: 700;
      word-break: break-word;
    }

    .track-shell {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 12px;
      align-items: stretch;
    }

    .leaderboard {
      border: 1px solid #2b3650;
      border-radius: 12px;
      background: linear-gradient(160deg, #111a2b 0%, #0d1421 100%);
      padding: 10px;
      min-height: 420px;
    }

    .leaderboard h3 {
      margin: 0 0 10px;
      color: #dce5f8;
      font-size: 12px;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .position-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 66vh;
      overflow: auto;
      padding-right: 2px;
    }

    .position-row {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid #25314a;
      border-radius: 8px;
      background: linear-gradient(155deg, #141c2b 0%, #0d1420 100%);
      padding: 8px;
    }

    .position-rank {
      color: #f8fbff;
      font-weight: 800;
      font-size: 14px;
      text-align: center;
    }

    .position-main {
      min-width: 0;
    }

    .position-name {
      color: #f8fbff;
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .position-meta {
      color: #9fb0cf;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .position-lap {
      color: #dce5f8;
      font-size: 11px;
      font-weight: 700;
    }

    .stage {
      border: 1px solid #2b3852;
      border-radius: 12px;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 0%, transparent 45%, rgba(255, 255, 255, 0.03) 100%),
        linear-gradient(180deg, #161f31 0%, #111827 100%);
      position: relative;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        -45deg,
        rgba(255, 255, 255, 0.018) 0 10px,
        transparent 10px 20px
      );
    }

    canvas {
      display: block;
      width: 100%;
      height: 74vh;
      min-height: 420px;
      position: relative;
      z-index: 1;
    }

    .track-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .track-driver {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 2px solid #dbe4fb;
      background: #0b121c;
      overflow: hidden;
      transform: translate(-50%, -50%);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.45);
      transition: left 850ms linear, top 850ms linear;
      will-change: left, top;
    }

    .track-driver img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .track-driver.no-image {
      display: grid;
      place-items: center;
      color: #f2f6ff;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .track-driver-badge {
      position: absolute;
      right: -6px;
      bottom: -6px;
      min-width: 14px;
      height: 14px;
      border-radius: 999px;
      padding: 0 3px;
      background: #0b121c;
      color: #fff;
      border: 1px solid #f1f6ff;
      display: grid;
      place-items: center;
      font-size: 8px;
      font-weight: 800;
      line-height: 1;
    }

    .error {
      color: #ff7a8d;
      margin-top: 8px;
      white-space: pre-wrap;
    }

    .drivers {
      margin-top: 14px;
      border: 1px solid #2b3650;
      border-radius: 10px;
      background: #0d121bcc;
      padding: 12px;
    }

    .drivers h3 {
      margin: 0 0 10px;
      color: #dce5f8;
      font-size: 12px;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .driver-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .driver-card {
      border: 1px solid #25314a;
      border-radius: 8px;
      background: linear-gradient(155deg, #141c2b 0%, #0d1420 100%);
      padding: 10px;
    }

    .driver-main {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .driver-face {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid #d9e2f9;
      background: #0d1421;
      flex: 0 0 auto;
    }

    .driver-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .driver-face.is-empty {
      display: grid;
      place-items: center;
      color: #e7efff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .driver-ident {
      min-width: 0;
      flex: 1;
    }

    .driver-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .driver-num {
      color: var(--ok);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .driver-acr {
      color: #e4ebfb;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .driver-name {
      color: #f8fbff;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .driver-team {
      color: #9fb0cf;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      word-break: break-word;
    }

    .empty-note {
      color: var(--muted);
      font-size: 13px;
      padding: 6px 0;
    }

    @media (max-width: 760px) {
      .brand-text .open {
        font-size: 18px;
      }

      .brand-text .f1 {
        font-size: 24px;
      }

      .tagline {
        font-size: 11px;
      }

      .session-pill {
        font-size: 11px;
      }

      canvas {
        height: 58vh;
        min-height: 340px;
      }
    }

    @media (max-width: 980px) {
      .track-shell {
        grid-template-columns: 1fr;
      }

      .leaderboard {
        min-height: 0;
      }

      .position-list {
        max-height: 240px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="masthead">
      <div class="brand">
        <svg class="logo" viewBox="0 0 180 96" role="img" aria-label="OpenF1 logo">
          <defs>
            <linearGradient id="logoRed" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff2438" />
              <stop offset="100%" stop-color="#ff7a00" />
            </linearGradient>
          </defs>
          <polygon fill="url(#logoRed)" points="0,70 68,22 130,22 62,70" />
          <polygon fill="#f3f6ff" points="80,70 150,22 180,22 110,70" />
          <rect x="130" y="44" width="48" height="10" fill="#ff2438" />
        </svg>
        <div>
          <div class="brand-text">
            <span class="open">OPEN</span>
            <span class="f1">F1</span>
          </div>
          <div class="tagline">Telemetry Control Deck</div>
        </div>
      </div>
      <div class="session-pill" id="sessionPill">No Circuit</div>
    </header>

    <div class="toolbar">
      <div class="control-group">
        <label class="control-label" for="modeSelect">Modus</label>
        <select id="modeSelect">
          <option value="live">Live</option>
          <option value="history">Historisch</option>
        </select>
      </div>
      <div class="control-group hidden" id="yearControl">
        <label class="control-label" for="yearSelect">Jahr</label>
        <select id="yearSelect"></select>
      </div>
      <div class="control-group wide hidden" id="sessionControl">
        <label class="control-label" for="sessionSelect">Session</label>
        <select id="sessionSelect"></select>
      </div>
      <div class="control-group replay hidden" id="replayControl">
        <label class="control-label" for="replayTimeline">Replay</label>
        <div class="replay-row">
          <button class="mini-btn" id="replayBackBtn"><span>-1 Lap</span></button>
          <button class="mini-btn" id="replayPlayPauseBtn"><span>Pause</span></button>
          <button class="mini-btn" id="replayForwardBtn"><span>+1 Lap</span></button>
          <select id="replaySpeedSelect">
            <option value="1">1x</option>
            <option value="2">2x</option>
            <option value="4">4x</option>
            <option value="8">8x</option>
            <option value="16">16x</option>
          </select>
          <input id="replayTimeline" type="range" min="1" max="1" value="1" step="1" />
          <div class="replay-value" id="replayTimelineValue">Lap 1</div>
        </div>
      </div>
      <button id="loadBtn"><span id="loadBtnLabel">Live Laden</span></button>
      <div class="meta" id="meta">Noch keine Daten geladen.</div>
    </div>

    <section class="stats">
      <article class="stat">
        <div class="label">Circuit</div>
        <div class="value" id="circuitValue">-</div>
      </article>
      <article class="stat">
        <div class="label">Drivers</div>
        <div class="value" id="driverCount">0</div>
      </article>
      <article class="stat">
        <div class="label">Track Points</div>
        <div class="value" id="pointCount">0</div>
      </article>
      <article class="stat">
        <div class="label">Lap</div>
        <div class="value" id="lapValue">-/-</div>
      </article>
    </section>

    <div class="track-shell">
      <aside class="leaderboard">
        <h3>Positionen</h3>
        <div class="position-list" id="positionList"></div>
      </aside>
      <div class="stage">
        <canvas id="trackCanvas"></canvas>
        <div class="track-overlay" id="trackOverlay"></div>
      </div>
    </div>
    <div class="error" id="errorBox"></div>

    <section class="drivers">
      <h3>Drivers</h3>
      <div class="driver-grid" id="driverGrid"></div>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
